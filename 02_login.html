<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            font-family:  Helvetica, sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        .card{
            background-color:#a09e9e;
            border-radius: 8px;
            padding: 30px;
            width: 300px ;
        }
        h2{
            color: #420c77;
            text-align: center;
            margin-bottom: 20px;
        }

        form{
            display:flex;
            flex-direction: column;
            gap: 10px ;
            
        }
        input{
            margin-bottom: 10px;
            padding:10px;
            border-radius: 5px;
            
            background-color: #afa2a2;
        }
        button{
            background-color: #420c77;
            color:#fff;
            padding:10px;
            border-radius:10px;

        }

        button:hover{
            background-color: #20063b;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login </h2>
        <form > 
            <input type="email" name="" id="" placeholder="Enter your mail">
            <input type="password" name="" id="" placeholder="Enter your password">
           <button type="submit">Login</button> 
        </form>
    </div>
</body>
</html>
